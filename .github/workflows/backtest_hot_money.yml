name: Backtest Hot Money Radar

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "回測起始日"
        required: false
        default: "2023-05-01"
      use_resilience:
        description: "韌性過濾"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Patch backtest parameters
        run: |
          python -c "
          import re, os
          start = os.environ.get('BT_START', '2023-05-01')
          use_r = os.environ.get('USE_R', 'true').lower() == 'true'
          with open('backtest_hot_money_radar.py', encoding='utf-8') as f: t = f.read()
          t = re.sub(r'^START_DATE = .*\$', 'START_DATE = \"' + start + '\"', t, count=1, flags=re.M)
          t = re.sub(r'^USE_RESILIENCE = .*\$', 'USE_RESILIENCE = ' + str(use_r), t, count=1, flags=re.M)
          with open('backtest_hot_money_radar.py', 'w', encoding='utf-8') as f: f.write(t)
          print('patched: start=', start, 'use_r=', use_r)
          "
        env:
          BT_START: ${{ inputs.start_date }}
          USE_R: ${{ inputs.use_resilience }}

      - name: Run backtest (~20-30 min)
        run: python backtest_hot_money_radar.py 2>&1 | tee backtest_log.txt

      - name: Notify LINE
        if: always()
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python notify_backtest_result.py

      - name: Commit results
        if: success()
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add backtest_hot_money_radar.json backtest_log.txt || true
          git diff --staged --quiet || git commit -m "feat: hot money radar backtest result"
          git push
