name: Backtest Hot Money v1.5 (族群持續性)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run v1.5 backtest (~5-10 min)
        run: python backtest_hot_money_v1_5.py 2>&1 | tee backtest_v1_5_log.txt

      - name: Commit results
        if: success()
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add backtest_hot_money_v1_5.json backtest_v1_5_log.txt || true
          git diff --staged --quiet || git commit -m "feat: hot money v1.5 backtest result"
          git push
