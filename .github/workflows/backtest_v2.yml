name: Backtest v2 (用戶實際流程)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run v2 backtest
        run: python backtest_hot_money_v2.py 2>&1 | tee backtest_v2_log.txt
      - name: Commit results
        if: success()
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          for f in backtest_hot_money_v2.json backtest_v2_log.txt; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --staged --quiet || git commit -m "feat: v2 (真版) backtest result"
          git push
