name: Daily ATH Scan

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          LINE_TOKEN:           ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:         ${{ secrets.LINE_USER_ID }}
          # SHIOAJI 暫停（帳戶 ca_required，歷史 K 抓不到）— 設 FORCE_SHIOAJI=1 才會啟用
          SHIOAJI_API_KEY:      ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY:   ${{ secrets.SHIOAJI_SECRET_KEY }}
        run: python daily_scan.py

      - name: Run industry ATH scan (yfinance)
        run: python industry_ath_yf.py || echo "industry scan failed (non-fatal)"

      - name: Commit state
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json dashboard_data.json tw_top5_state.json capital_cache.json sp500_universe.json tw_universe.json ath_industry_report.json scan_output.txt || true
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%d)"
          git push
