name: Daily ATH Scan

on:
  schedule:
    # 台灣 08:00 盤前 (UTC+8) → UTC 00:00，週一~週五
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run industry ATH scan (yfinance) - 先跑，daily scan 會讀
        run: python industry_ath_yf.py || echo "industry scan failed (non-fatal)"

      - name: Run US-TW sector sync scan - V5c 資訊參考
        run: python us_tw_sector_sync.py || echo "sync scan failed (non-fatal)"

      - name: Run daily scan (V4 完整日報 — 計算但 LINE 暫停，僅 hot_money_radar 推播)
        env:
          LINE_TOKEN:           ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:         ${{ secrets.LINE_USER_ID }}
          LINE_PAUSED:          "1"   # ← 暫停 V4 LINE 推（state 仍會更新）
          # SHIOAJI 暫停（帳戶 ca_required，歷史 K 抓不到）— 設 FORCE_SHIOAJI=1 才會啟用
          SHIOAJI_API_KEY:      ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY:   ${{ secrets.SHIOAJI_SECRET_KEY }}
        run: python daily_scan.py

      - name: Run Hot Money Radar - 內部訊號 (不推 LINE)
        env:
          LINE_PAUSED:          "1"
        run: python hot_money_radar.py || echo "hot money radar failed (non-fatal)"

      - name: Run Daily V2 Picker - 每日推播 (V2 原版策略)
        env:
          LINE_TOKEN:           ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:         ${{ secrets.LINE_USER_ID }}
        run: python daily_v2_picker.py || echo "daily v2 picker failed (non-fatal)"

      - name: Run Daily Review - 累積 top5_history (週檢討需要)
        run: python daily_review.py || echo "daily review failed (non-fatal)"

      - name: Commit state
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json dashboard_data.json tw_top5_state.json capital_cache.json sp500_universe.json tw_universe.json ath_industry_report.json scan_output.txt marketcap_cache.json top5_history.json daily_review.json us_tw_sync_report.json industry_heat_history.json hot_money_signal.json daily_v2_signal.json || true
          git diff --staged --quiet || git commit -m "chore: update state $(date -u +%Y-%m-%d)"
          git push
