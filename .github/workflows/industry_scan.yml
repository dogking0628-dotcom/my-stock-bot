name: Industry ATH Scan (Shioaji)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run industry ATH scan
        env:
          SHIOAJI_API_KEY:    ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
        run: python industry_ath_scan.py | tee scan_output.txt

      - name: Commit report
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          for f in ath_industry_report.json scan_output.txt; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --staged --quiet || git commit -m "chore: industry ATH scan $(date -u +%Y-%m-%d)"
          git push
