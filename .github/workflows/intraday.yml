name: Intraday Scan (TW market hours)

on:
  schedule:
    # 以台灣時間為準，盤中每 30 分掃描，最後一次不超過 13:00 (UTC+8)
    # 台灣 09:00-12:30 = UTC 01:00-04:30
    - cron: '0,30 1-4 * * 1-5'
    # 台灣 13:00 = UTC 05:00 (最後一次)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday scan
        env:
          LINE_TOKEN:    ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:  ${{ secrets.LINE_USER_ID }}
        run: python intraday_scan.py

      - name: Commit report
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add ath_industry_report.json scan_output.txt || true
          git diff --staged --quiet || git commit -m "chore: intraday scan $(date -u +%Y-%m-%d_%H:%M)"
          git push
