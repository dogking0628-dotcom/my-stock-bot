name: Post-close Strategy Review

on:
  schedule:
    # 台北 14:30 = UTC 06:30，週一至週五
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly review
        env:
          LINE_TOKEN:    ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:  ${{ secrets.LINE_USER_ID }}
          LINE_PAUSED:   "1"   # 🔇 暫停推播
        run: |
          python weekly_review.py | tee review_output.txt
          # 推 LINE
          python -c "
          import notify_line
          with open('review_output.txt', encoding='utf-8') as f:
              msg = f.read().strip()
          if msg:
              notify_line.push(msg)
          "
      - name: Commit review
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add weekly_review.json review_output.txt || true
          git diff --staged --quiet || git commit -m "chore: post-close review $(date -u +%Y-%m-%d)"
          git push
