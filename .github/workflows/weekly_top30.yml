name: Weekly Top30 Check

on:
  schedule:
    # 每週一 UTC 02:00 = 越南 09:00 週一早晨
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd cloud_bot
          pip install -r requirements.txt

      - name: Run Top30 check
        env:
          LINE_TOKEN:   ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          cd cloud_bot
          python top30_check.py
